<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
	<!-- Background Gradient -->
	<linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
	  <stop offset="0%" stop-color="#2563EB" />
	  <stop offset="100%" stop-color="#4338CA" />
	</linearGradient>

	<!-- Shadow for Depth -->
	<filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
	  <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
	</filter>
  </defs>

  <!-- App Icon Base -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bgGradient)" />

  <!-- Background File (The Duplicate) -->
  <rect x="136" y="120" width="176" height="224" rx="16" fill="#93C5FD" opacity="0.8" />

  <!-- Foreground File (The Original) -->
  <rect x="184" y="168" width="176" height="224" rx="16" fill="#FFFFFF" filter="url(#dropShadow)" />

  <!-- File Text Lines (For Detail) -->
  <rect x="216" y="216" width="112" height="12" rx="6" fill="#E2E8F0" />
  <rect x="216" y="248" width="112" height="12" rx="6" fill="#E2E8F0" />
  <rect x="216" y="280" width="80" height="12" rx="6" fill="#E2E8F0" />

  <!-- Magnifying Glass Ring -->
  <circle cx="288" cy="288" r="56" fill="none" stroke="#F59E0B" stroke-width="24" filter="url(#dropShadow)" />

  <!-- Magnifying Glass Handle -->
  <line x1="328" y1="328" x2="384" y2="384" stroke="#F59E0B" stroke-width="28" stroke-linecap="round" filter="url(#dropShadow)" />

  <!-- Inner Glass Tint -->
  <circle cx="288" cy="288" r="44" fill="#60A5FA" opacity="0.2" />
</svg>
